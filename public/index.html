<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Secure File Vault</title>

    <!-- ✅ Correct CSS link -->
    style.css
</head>
<body>

<!-- SET PIN -->
<div id="setPinScreen" class="screen">
    <h2>Set Your PIN</h2>
    <input type="password" id="newPin" placeholder="Enter PIN">
    <input type="password" id="confirmPin" placeholder="Confirm PIN">
    <button onclick="setPin()">Save PIN</button>
    <p id="setPinError"></p>
</div>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="screen">
    <h1>🔐 Secure Vault</h1>
    <input type="password" id="pinInput" placeholder="Enter PIN">
    <button onclick="unlockApp()">Unlock</button>
    <p id="errorText"></p>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
    <h2>Home</h2>
    <button onclick="showScreen('filesScreen')">📁 File Manager</button>
    <button onclick="lockApp()">Lock</button>
</div>

<!-- FOLDERS -->
<div id="filesScreen" class="screen">
    <h2>Folders</h2>
    <button onclick="openFolder('documents')">Documents</button>
    <button onclick="openFolder('images')">Images</button>
    <button onclick="openFolder('videos')">Videos</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- FILE LIST -->
<div id="folderScreen" class="screen">
    <h2 id="folderTitle"></h2>

    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload File</button>

    <ul id="fileList"></ul>

    <button onclick="showScreen('filesScreen')">Back</button>
</div>

<!-- ✅ Correct JS link -->
script.js</script>
</body>
</html>
